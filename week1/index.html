<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>My Website</title>
        <link rel="stylesheet" href="week-1-style.css">
    </head>

    <body>
        <nav class="navbar">
            <a>My Website</a>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
                <li>Item 4</li>
            </ul>
            <button class="burger">☰</button>

        </nav>

        <div class="popup-menu">
            <span class="close-btn">x</span>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
                <li>Item 4</li>
            </ul>
        </div>

        <section class="banner">
            <h1>Welcome to MyHome</h1>
        </section>
        <main class="main-content">
            <div class="bars">
                <!--bars-->
                <div class="bar">
                    <img src="cat.jpg" alt="Promotion 1">
                    <p>Promotion 1</p>
                </div>
                <div class="bar">
                    <img src="cat.jpg" alt="Promotion 2">
                    <p>Promotion 2</p>
                </div>
                <div class="bar">
                    <img src="cat.jpg" alt="Promotion 3">
                    <p>Promotion 3</p>
                </div>
            </div>
            <div class="content-blocks">
                <!--content blocks-->
                <div class="block">
                    <span>⭐</span>
                    <p>Title 1</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 2</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 3</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 4</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 5</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 6</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 7</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 8</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 9</p>
                </div>
                <div class="block">
                    <span>⭐</span>
                    <p>Title 10</p>
                </div>
            </div>
        </main>

        <script>
            const burger= document.querySelector ('.burger');
            const popupMenu= document.querySelector ('.popup-menu');
            const closeBtn= document.querySelector ('.close-btn');

            burger.addEventListener ('click', function(){
                popupMenu.classList.add('active')
            });

            closeBtn.addEventListener('click', function() {
                popupMenu.classList.remove('active');
            });
        </script>

    </body>
</html>
