<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁</title>
    <style>
        .header {
            background-color: #456;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .section {
            border-top: 1px solid #ccc;
            margin-top: 20px;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">歡迎光臨，請輸入信箱密碼</div>
    <div class="content">
        <h2>登入系統</h2>
        <form id="login-form" action="/login" method="post">
            <p>
                信箱 <input type="text" name="email">
            </p>
            <p>
                密碼 <input type="password" name="password">
            </p>
            <p>
                同意條款 <input type="checkbox" id="agree">
            </p>
            <p>
                <button type="submit">登入</button>
            </p>
        </form>

        <div class="section">
            <h2>取得旅館資訊</h2>
            <p>
                編號 <input type="text" id="hotel-id">
            </p>
            <p>
                <button id="hotel-btn">取得</button>
            </p>
        </div>
    </div>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
