<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>My Website</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <nav class="navbar">
            <a>My Website</a>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
                <li>Item 4</li>
            </ul>
            <button class="burger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="popup-menu">
            <span class="close-btn">x</span>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
                <li>Item 4</li>
            </ul>
        </div>

        <section class="banner">
            <h1>Welcome to MyHome</h1>
        </section>

        <main class="main-content">
            <div class="bars"></div>
            <div class="content-blocks"></div>
            <div style="text-align:center; margin: 20px">
                <button id="load-more">Load More</button>
            </div>
        </main>

        <script>
            // 漢堡選單
            const burger = document.querySelector('.burger');
            const popupMenu = document.querySelector('.popup-menu');
            const closeBtn = document.querySelector('.close-btn');

            burger.addEventListener('click', function() {
                popupMenu.classList.add('active');
            });

            closeBtn.addEventListener('click', function() {
                popupMenu.classList.remove('active');
            });

            // 抓景點資料
            Promise.all([
                fetch("https://cwpeng.github.io/test/assignment-3-1").then(function(r) { return r.json(); }),
                fetch("https://cwpeng.github.io/test/assignment-3-2").then(function(r) { return r.json(); })
            ]).then(function(results) {
                var data1 = results[0]; // 基本資料
                var data2 = results[1]; // 圖片資料

                // 把圖片做成查找表
                var imageMap = {};
                var host = data2.host;
                data2.rows.forEach(function(row) {
                    var firstPic = row.pics.split(".jpg")[0] + ".jpg";
                    imageMap[row.serial] = host + firstPic;
                });

                // 合併資料
                var attractions = data1.rows.map(function(row) {
                    return {
                        name: row.sname,
                        image: imageMap[row.serial] || ""
                    };
                });

                var barsDiv = document.querySelector(".bars");
                var blocksDiv = document.querySelector(".content-blocks");

                // 前 3 個放 bars
                for (var i = 0; i < 3; i++) {
                    var bar = document.createElement("div");
                    bar.className = "bar";

                    var img = document.createElement("img");
                    img.src = attractions[i].image;
                    img.alt = attractions[i].name;

                    var p = document.createElement("p");
                    p.textContent = attractions[i].name;

                    bar.appendChild(img);
                    bar.appendChild(p);
                    barsDiv.appendChild(bar);
                }

                // 第 4～13 個放 content-blocks
                for (var i = 3; i < 13; i++) {
                    var block = document.createElement("div");
                    block.className = "block";

                    var star = document.createElement("span");
                    star.textContent = "⭐";

                    var img = document.createElement("img");
                    img.src = attractions[i].image;
                    img.alt = attractions[i].name;

                    var p = document.createElement("p");
                    p.textContent = attractions[i].name;

                    block.appendChild(star);
                    block.appendChild(img);
                    block.appendChild(p);
                    blocksDiv.appendChild(block);
                }
                // Load More 功能
                var currentIndex = 13; // 目前顯示到第幾個
                var loadMoreBtn = document.querySelector("#load-more");

                loadMoreBtn.addEventListener("click", function() {
                    var end = currentIndex + 10;
                    for (var i = currentIndex; i < end && i < attractions.length; i++) {
                        var block = document.createElement("div");
                        block.className = "block";

                        var star = document.createElement("span");
                        star.textContent = "⭐";

                        var img = document.createElement("img");
                        img.src = attractions[i].image;
                        img.alt = attractions[i].name;

                        var p = document.createElement("p");
                        p.textContent = attractions[i].name;

                        block.appendChild(star);
                        block.appendChild(img);
                        block.appendChild(p);
                        blocksDiv.appendChild(block);
                    }
                    currentIndex = end;

                    // 沒有更多資料就隱藏按鈕
                    if (currentIndex >= attractions.length) {
                        loadMoreBtn.style.display = "none";
                    }
            });

        });
        </script>

    </body>
</html>
